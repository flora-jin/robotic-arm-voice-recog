<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Node Sound Controller</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl p-8 w-full max-w-md">

<h1 class="text-3xl font-bold text-gray-800 text-center mb-2">
🎵 Sound Controller
</h1>

<p class="text-gray-500 text-sm text-center mb-6">
Select an audio file to use for playback
</p>

<div class="space-y-4">

<select id="soundDropdown"
class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
<option>Loading sounds...</option>
</select>

<button onclick="changeSound()"
class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition duration-200 shadow-lg">
Update Sound
</button>

<div id="status" class="text-center text-sm mt-3 text-gray-600"></div>

</div>

</div>

<script>

const API_BASE = "http://localhost:8000"

async function loadSounds() {

    const dropdown = document.getElementById("soundDropdown")

    try {

        const res = await fetch(`${API_BASE}/get_sounds`)
        const sounds = await res.json()

        dropdown.innerHTML = ""

        sounds.forEach(sound => {

            const option = document.createElement("option")
            option.value = sound
            option.textContent = sound
            dropdown.appendChild(option)

        })

    } catch (err) {

        dropdown.innerHTML = "<option>Failed to load sounds</option>"

    }

}

async function changeSound() {

    const dropdown = document.getElementById("soundDropdown")
    const status = document.getElementById("status")

    const selected = dropdown.value

    try {

        const res = await fetch(
            `${API_BASE}/change_sound?audio_file=${encodeURIComponent(selected)}`,
            { method: "POST" }
        )

        const data = await res.json()

        if (data.current_sound) {

            status.innerHTML = `✅ Current sound set to <b>${data.current_sound}</b>`
            status.className = "text-green-600 text-sm text-center mt-3"

        } else {

            status.innerHTML = `⚠️ ${data.message}`
            status.className = "text-yellow-600 text-sm text-center mt-3"

        }

    } catch (err) {

        status.innerHTML = "❌ Could not reach API"
        status.className = "text-red-600 text-sm text-center mt-3"

    }

}

window.onload = loadSounds

</script>

</body>
</html>
