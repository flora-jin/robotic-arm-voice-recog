<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Node Sound Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-6 font-sans">

    <!-- MAIN VIEW -->
    <div id="mainView" class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Soundscape Widget -->
        <div onclick="showSounds()" class="bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl p-8 cursor-pointer hover:scale-105 hover:bg-white transition-all duration-300 transform flex flex-col items-center text-center">
            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-4">Soundscape</h2>
            <p class="text-gray-600 font-medium">sound as object</p>
        </div>

        <!-- Telepathy Widget -->
        <div class="bg-white/50 backdrop-blur-md shadow-lg rounded-2xl p-8 cursor-default flex flex-col items-center text-center">
            <h2 class="text-3xl font-bold text-gray-700 mb-4">Telepathy</h2>
            <p class="text-gray-500 font-medium">sound as selective communication</p>
        </div>

        <!-- Ventriloquism Widget -->
        <div class="bg-white/50 backdrop-blur-md shadow-lg rounded-2xl p-8 cursor-default flex flex-col items-center text-center">
            <h2 class="text-3xl font-bold text-gray-700 mb-4">Ventriloquism</h2>
            <p class="text-gray-500 font-medium">sound as properties of other objects</p>
        </div>

    </div>

    <!-- SOUNDS VIEW -->
    <div id="soundsView" class="hidden bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl p-10 w-full max-w-md">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-8">
            🎵 Available Sounds
        </h1>
        
        <ul id="soundList" class="space-y-4 mb-8">
            <li class="p-4 bg-gray-100 rounded-xl text-center text-gray-500 font-medium shadow-inner">Loading sounds...</li>
        </ul>

        <button onclick="showMain()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl transition duration-200 shadow-xl transform hover:-translate-y-1">
            Back to Menu
        </button>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";

        async function loadSounds() {
            const list = document.getElementById("soundList");
            try {
                const res = await fetch(`${API_BASE}/get_sounds`);
                const sounds = await res.json();
                
                list.innerHTML = "";
                sounds.forEach(sound => {
                    const li = document.createElement("li");
                    
                    // Format the sound name for nice display
                    let displayName = sound.replace('.mp3', '').replace('_', ' ');
                    displayName = displayName.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    
                    li.className = "p-5 bg-white shadow-md border border-gray-100 rounded-xl text-xl text-center font-bold text-gray-800 transform transition-transform hover:scale-105 duration-200";
                    li.textContent = displayName;
                    list.appendChild(li);
                });
            } catch (err) {
                list.innerHTML = `<li class="p-5 bg-red-50 text-red-600 rounded-xl text-center font-bold border border-red-200 shadow-sm">Failed to load sounds</li>`;
            }
        }

        function showSounds() {
            document.getElementById("mainView").classList.add("hidden");
            document.getElementById("soundsView").classList.remove("hidden");
            loadSounds();
        }

        function showMain() {
            document.getElementById("soundsView").classList.add("hidden");
            document.getElementById("mainView").classList.remove("hidden");
        }
    </script>
</body>
</html>
